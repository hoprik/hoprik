comments:
  consecutive_moves: "Уважаемый {author}! Настоящим уведомляем, что совершение двух последовательных ходов одним и тем же лицом (далее — 'Игрок') противоречит регламенту проведения шахматной партии, утверждённому настоящим README. Предлагается привлечь третье лицо для осуществления следующего хода. Заранее благодарим за понимание."

  game_over: |-
      Настоящим констатируем факт окончания партии. Результат: {outcome}! В данной партии зафиксировано {num_moves} ходов, совершённых {num_players} игроками (субъектами персональных данных).

      Выражаем глубокую признательность {players} за участие в интеллектуальном мероприятии.

  invalid_board: "{author} Согласно результатам технической экспертизы, доска признана невалидной. Выполнение указанного хода невозможно. Пожалуйста, обратитесь к администратору Системы."

  invalid_move: |-
      {author} Ваш ход `{move}` не прошёл валидацию. Вероятно, другой игрок осуществил перемещение ранее, изменив таким образом состояние доски. Повторите попытку с учётом актуальной конфигурации фигур.

  invalid_new_game: "{author} Ваша заявка на создание новой партии отклонена, так как текущая партия находится в активной фазе. Согласно правилам, право перезапуска принадлежит исключительно владельцу репозитория."

  successful_move: |-
      {author} Операция успешно выполнена. Ход `{move}` зафиксирован в протоколе партии.
      Благодарим за соблюдение регламента.

  successful_new_game: "{author} Ваша заявка одобрена. Новая шахматная партия успешно инициирована. Желаем плодотворной игры."

  unknown_command: "{author} Команда не распознана. Пожалуйста, убедитесь, что формат обращения соответствует требованиям, изложенным в документации. Не изменяйте заголовок issue."

issues:
  link: "https://github.com/{repo}/issues/new?{params}"
  move:
    body: "Пожалуйста, не меняйте заголовок. Просто нажмите «Submit new issue». Никаких дополнительных действий не требуется :D"
    title: "Chess: Move {source} to {dest}"
  new_game:
    body: "Пожалуйста, не меняйте заголовок. Просто нажмите «Submit new issue». Больше ничего делать не нужно :D"
    title: "Chess: Start new game"

markers:
  board:
    begin: "<!-- BEGIN CHESS BOARD -->\n"
    end: "<!-- END CHESS BOARD -->\n"
  last_moves:
    begin: "<!-- BEGIN LAST MOVES -->\n"
    end: "<!-- END LAST MOVES -->\n"
  moves:
    begin: "<!-- BEGIN MOVES LIST -->\n"
    end: "<!-- END MOVES LIST -->\n"
  top_moves:
    begin: "<!-- BEGIN TOP MOVES -->\n"
    end: "<!-- END TOP MOVES -->\n"
  turn:
    begin: "<!-- BEGIN TURN -->"
    end: "<!-- END TURN -->"

misc:
  max_last_moves: 5
  max_top_moves: 10
